// Function to sum multiples of a or b up to n           
function sumOfMultiples(a,b,n)
{
    let sum=0;


    for(let i=1;i<n;i++)
        if(i%a==0 || i%b==0) // or ||
        {
            sum +=i;
        }
        return sum;
}
let result=sumOfMultiples(3,5,10)
alert(result);


// Exercise 4: Function f4 that takes 2 integers and an array
// Returns sum of all multiples of a or b in the array
            function f4(a, b, arr) {
    let sum = 0;
    for (let i = 0; i < arr.length; i++) {
        if (arr[i] % a === 0 || arr[i] % b === 0) {
            sum += arr[i];
        }
    }
    return sum;
}
let result2=f4(5,7,[5,6,7,8,9,10]);
console.log(result2);
alert(result2)
