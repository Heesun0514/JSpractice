<html>
    <head>
        <script>
            function sumOfMultiples(a,b,n)
{
    let sum=0;


    for(let i=1;i<n;i++)
        if(i%a==0 || i%b==0) // or ||
        {
            sum +=i;
        }
        return sum;
}
let result=sumOfMultiples(10,3,5)

            alert(result);
        </script>
    </head>

</html>
