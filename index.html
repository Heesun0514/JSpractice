            function sumOfMultiples(a,b,n)
{
    let sum=0;


    for(let i=1;i<n;i++)
        if(i%a==0 || i%b==0) // or ||
        {
            sum +=i;
        }
        return sum;
}

            function f4(a, b, arr) {
    let sum = 0;
    for (let i = 0; i < arr.length; i++) {
        if (arr[i] % a === 0 || arr[i] % b === 0) {
            sum += arr[i];
        }
    }
    return sum;
}
