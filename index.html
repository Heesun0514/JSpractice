 /*
 
 Exercise 2:

Create a page with a button

When the user clicks,

If we list all the natural numbers below 10 that are multiples of 3 or 5, we get 3, 5, 6 and 9. The sum of these multiples is 23.

Find the sum of all the multiples of 3 or 5 below 1000 and alert the user to the correct answer.
 
 */


function f2(a, b, n) {
    let sum = 0;
    for (let i = 0; i < n; i++) {
        if (i % a === 0 || i % b === 0) {
            sum += i;
        }
    }
    return sum;
   
}

function showResult2(){
let result=f2(3,5,1000);
alert("The sum of all multiples of 3 or 5 below 1000 is :"+ result);}

// let result1= f4(5,7,[5,6,7,8,9,10]);
// alert(result1)

function handleCalculateF4() {
            let a = Number(document.getElementById('a_f4').value);
            //document: 현재 웹페이지 문서
            //.getElementById('a'): id가 "a"인 요소(입력창)를 찾음
            // .value: 그 입력창에 입력된 값을 가져옴
            // Number(): 가져온 값을 숫자로 변환
            //결과: 사용자가 a 입력창에 쓴 숫자가 a 변수에 저장됨

            let b = Number(document.getElementById('b_f4').value);
            
            let text = document.getElementById('l_f4').value;
            // let text: text라는 변수 만들기
                // 사용자가 "5,6,7,8,9,10" 입력
                // text = "5,6,7,8,9,10" (문자열 그대로)



            let arr = text.split(',').map(Number);
            //text.split(','): 문자열을 쉼표(,) 기준으로 자름
            //예: "5,6,7" → ["5", "6", "7"]
            //.map(Number): 배열의 각 요소를 복사하면서 Number로 변환
            // 예: ["5", "6", "7"] → [5, 6, 7]



            let answer = f4(a, b, arr);
            alert(" the sum of all the multiples of a or b in array :"+ answer);
        }

in a found in l (a and l should be arrays of integers, a is of length 2)

*/


function f5(a,l)
{
    let sum=0;

    for(let i=0;i<l.length;i++)
        if (l[i]%a[0]===0 || l[i]%a[1]===0 )
        {
            sum=sum+l[i];
        }

 return sum;
}

/*
Exercise 6, Arrays: f6 should take array parameters and return an integer.

Create a function f6 to return the sum of all the multiples of factors in a found in in l 

(a and l should be arrays of integers)

*/


function f6(a, l) {
    let sum = 0;
    
    for (let i = 0; i < l.length; i++) {
      
        for (let j = 0; j < a.length; j++) {
            if (l[i] % a[j] === 0) {
                sum += l[i];
                break; 
            }
        }
    }
    
    return sum;
}
